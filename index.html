<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Underwater Quizlet OS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root {
            --deep-blue: #001219;
            --ocean-cyan: #94d2bd;
            --neon-purple: #9d50bb;
        }

        body {
            margin: 0;
            background: linear-gradient(180deg, #005f73 0%, var(--deep-blue) 100%);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            background-attachment: fixed;
        }

        /* BUBBLE ENGINE */
        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            bottom: -100px;
            animation: rise var(--d) infinite ease-in;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes rise {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            50% { opacity: 0.6; }
            100% { transform: translateY(-120vh) scale(1.5); opacity: 0; }
        }

        /* RYBY */
        .fish {
            position: absolute;
            font-size: 2.5rem;
            animation: swim var(--t) infinite linear;
            z-index: 2;
            pointer-events: none;
        }

        @keyframes swim {
            from { left: -100px; transform: scaleX(1); }
            to { left: 110vw; transform: scaleX(1); }
        }

        /* LOGIN OVERLAY */
        #login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,18,25,0.85);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        /* HLAVNÍ PANEL */
        .glass-panel {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            border: 2px solid var(--ocean-cyan);
            border-radius: 25px;
            padding: 30px;
            width: 90%;
            max-width: 600px;
            margin-top: 50px;
            z-index: 10;
            box-shadow: 0 0 40px rgba(148, 210, 189, 0.3);
            text-align: center;
            display: none; /* Skryto do přihlášení */
        }

        .card { height: 250px; perspective: 1000px; margin: 20px 0; cursor: pointer; }
        .card-inner {
            position: relative; width: 100%; height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            border: 2px solid var(--ocean-cyan);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; padding: 20px; background: rgba(255,255,255,0.05);
        }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back {
            position: absolute; backface-visibility: hidden;
            width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
        }
        .card-back { transform: rotateY(180deg); color: var(--ocean-cyan); background: rgba(0, 210, 255, 0.1); }

        input, button, select {
            background: rgba(0,18,25,0.8);
            color: var(--ocean-cyan);
            border: 1px solid var(--ocean-cyan);
            padding: 12px 20px;
            border-radius: 10px;
            margin: 10px;
            font-weight: bold;
            font-size: 1rem;
        }
        button:hover { background: var(--ocean-cyan); color: var(--deep-blue); cursor: pointer; box-shadow: 0 0 15px var(--ocean-cyan); }
    </style>
</head>
<body>

    <div id="bg-elements"></div>

    <div id="login-overlay">
        <h1 style="color: var(--ocean-cyan); text-shadow: 0 0 15px var(--ocean-cyan);">DEEP SEA ARCHIVE</h1>
        <p>Zadej dešifrovací klíč pro vstup</p>
        <input type="password" id="passKey" placeholder="Heslo...">
        <button onclick="unlock()">ODEMKNOUT 🔓</button>
        <p style="font-size: 0.8rem; opacity: 0.5;">(Zkus heslo: richard)</p>
    </div>

    <div class="glass-panel" id="mainPanel">
        <h1 style="color: var(--ocean-cyan);">RIŠA OS 🌊</h1>
        
        <select id="subjectSelect" onchange="loadSubject()">
            <option value="BI301K">BI301K - Hlavní</option>
            <option value="PB111">PB111 - Operační systémy</option>
        </select>

        <div class="card" id="mainCard" onclick="this.classList.toggle('flipped')">
            <div class="card-inner">
                <div class="card-front" id="qText">Vyber předmět...</div>
                <div class="card-back" id="aText">Zde se objeví odpověď.</div>
            </div>
        </div>

        <div class="controls">
            <button onclick="prev()">⬅ Zpět</button>
            <span id="counter">0 / 0</span>
            <button onclick="next()">Vpřed ➡</button>
        </div>
    </div>

    <script>
        let MASTER_KEY = "";
        let currentCards = [];
        let index = 0;

        // BUBBLE & FISH ENGINE - Spustí se hned!
        function createOcean() {
            const container = document.getElementById('bg-elements');
            const fishTypes = ['🐟', '🐠', '🦈', '🐙', '🐡', '🐢'];
            
            // Bublinky
            for(let i=0; i<20; i++) {
                const b = document.createElement('div');
                b.className = 'bubble';
                b.style.left = Math.random() * 100 + 'vw';
                const size = (Math.random() * 25 + 10) + 'px';
                b.style.width = size;
                b.style.height = size;
                b.style.setProperty('--d', (Math.random() * 6 + 4) + 's');
                b.style.animationDelay = Math.random() * 8 + 's';
                container.appendChild(b);
            }

            // Ryby
            for(let i=0; i<6; i++) {
                const f = document.createElement('div');
                f.className = 'fish';
                f.innerText = fishTypes[Math.floor(Math.random() * fishTypes.length)];
                f.style.top = Math.random() * 80 + 'vh';
                f.style.setProperty('--t', (Math.random() * 12 + 8) + 's');
                f.style.animationDelay = Math.random() * 15 + 's';
                container.appendChild(f);
            }
        }

        function unlock() {
            const input = document.getElementById('passKey').value;
            if(!input) return;

            MASTER_KEY = input;

            // NOUZOVÝ REŽIM PRO HESLO "richard"
            if(input === "richard") {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('mainPanel').style.display = 'block';
                currentCards = ["Systém:Odemčeno pomocí 'richard'!", "Status:Funguje to!", "Data:Nahraj soubory do /data/"];
                updateUI();
                return;
            }

            // Jinak zkusit reálné dešifrování
            loadSubject();
        }

        async function loadSubject() {
            const sub = document.getElementById('subjectSelect').value;
            try {
                const response = await fetch(`./data/${sub}.txt`);
                if(!response.ok) throw new Error("Soubor nenalezen");
                
                const encryptedHex = await response.text();
                const bytes = CryptoJS.AES.decrypt(encryptedHex.trim(), MASTER_KEY);
                const decryptedText = bytes.toString(CryptoJS.enc.Utf8);

                if(!decryptedText) throw new Error("Špatné heslo");

                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('mainPanel').style.display = 'block';

                currentCards = decryptedText.split('\n').filter(line => line.includes(':'));
                index = 0;
                updateUI();
            } catch (e) {
                alert("Přístup odepřen: " + e.message);
            }
        }

        function updateUI() {
            if(currentCards.length === 0) return;
            const parts = currentCards[index].split(':');
            document.getElementById('qText').innerText = parts[0];
            document.getElementById('aText').innerText = parts[1] || "";
            document.getElementById('counter').innerText = `${index + 1} / ${currentCards.length}`;
            document.getElementById('mainCard').classList.remove('flipped');
        }

        function next() { if(currentCards.length) { index = (index + 1) % currentCards.length; updateUI(); } }
        function prev() { if(currentCards.length) { index = (index - 1 + currentCards.length) % currentCards.length; updateUI(); } }

        // Start podvodního světa
        createOcean();

        // Klávesy
        document.addEventListener('keydown', (e) => {
            if(e.code === "Space") document.getElementById('mainCard').classList.toggle('flipped');
            if(e.code === "ArrowRight") next();
            if(e.code === "ArrowLeft") prev();
        });
    </script>
</body>
</html>
