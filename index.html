<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>ABYSSAL::TERMINAL_83</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --atari-green: #33ff33;
            --atari-green-glow: #00ff00;
            --bg: #000000;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--atari-green);
            font-family: 'VT323', monospace; /* Retro font */
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase; /* Všechno velkým */
            letter-spacing: 1px;
        }

        /* CRT EFEKT - Scanlines */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
            z-index: 2000;
            pointer-events: none;
            opacity: 0.15;
        }

        /* CRT EFEKT - Jemné blikání */
        body::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: rgba(18, 16, 16, 0.1);
            opacity: 0;
            z-index: 1999;
            pointer-events: none;
            animation: flicker 0.15s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.552; }
            100% { opacity: 0.482; }
        }

        /* ATARI RAIN ENGINE */
        #bg-elements {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            overflow: hidden;
        }

        .atari-drop {
            position: absolute;
            color: var(--atari-green);
            font-size: 1.5rem;
            line-height: 1;
            text-shadow: 0 0 5px var(--atari-green-glow);
            animation: fall linear infinite;
            opacity: 0.8;
        }

        @keyframes fall {
            from { transform: translateY(-100%); }
            to { transform: translateY(100vh); }
        }

        /* LOGIN OVERLAY */
        #login-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            border: 4px solid var(--atari-green);
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 20px var(--atari-green-glow);
        }

        /* HLAVNÍ PANEL */
        .glass-panel {
            display: none; /* Skryto do login */
            width: 800px;
            height: 600px;
            border: 4px solid var(--atari-green);
            background: var(--bg);
            z-index: 10;
            box-shadow: 0 0 30px var(--atari-green-glow);
            padding: 20px;
            grid-template-rows: 50px 1fr 100px;
        }

        header {
            border-bottom: 2px solid var(--atari-green);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.5rem;
        }

        /* QUIZLET SECTION */
        .content {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card-container {
            width: 100%;
            height: 300px;
            perspective: 1000px;
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%; height: 100%;
            transition: transform 0.1s; /* Rychlé, "trhané" otočení */
            transform-style: preserve-3d;
            border: 2px solid var(--atari-green);
        }

        .card-container.flipped .card-inner { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%; height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-size: 2.5rem;
            text-align: center;
            background: var(--bg);
        }

        .card-back {
            transform: rotateY(180deg);
            color: var(--bg);
            background: var(--atari-green);
            font-size: 1.8rem;
        }

        /* INPUTY A TLAČÍTKA */
        input, select, button {
            background: var(--bg);
            border: 2px solid var(--atari-green);
            color: var(--atari-green);
            font-family: 'VT323', monospace;
            padding: 10px 20px;
            font-size: 1.2rem;
            outline: none;
            text-transform: uppercase;
        }

        button:hover {
            background: var(--atari-green);
            color: var(--bg);
            cursor: pointer;
        }

        .controls {
            border-top: 2px solid var(--atari-green);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-top: 10px;
        }

        /* Blikající kurzor */
        .cursor {
            display: inline-block;
            width: 10px;
            height: 1.2rem;
            background: var(--atari-green);
            animation: blink 0.5s infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="bg-elements"></div>

    <div id="login-overlay">
        <div class="login-box">
            <h1 style="font-size: 3rem; margin-bottom: 10px;">ABYSSAL<span class="cursor"></span></h1>
            <p style="margin-bottom: 20px;">SYSTEM 83 // RESEARCH TERMINAL</p>
            <p>ZADEJ KÓD:</p>
            <input type="password" id="passKey" placeholder="********">
            <br><br>
            <button onclick="unlock()">> VSTOUPIT</button>
            <p style="margin-top: 15px; font-size: 0.9rem; opacity: 0.4;">Hint: richard</p>
        </div>
    </div>

    <div class="glass-panel" id="desktop">
        <header>
            <div>ABYSSAL::OS v1983.1</div>
            <select id="subjectSelect" onchange="loadSubject()">
                <option value="BI301K">BI301K: OS</option>
                <option value="PB111">PB111: PROGRAM</option>
            </select>
        </header>

        <main class="content">
            <div class="card-container" id="card" onclick="this.classList.toggle('flipped')">
                <div class="card-inner">
                    <div class="card-face card-front" id="qText">CEKÁM NA DATA</div>
                    <div class="card-face card-back" id="aText">AUTORIZACE NUTNÁ</div>
                </div>
            </div>
        </main>

        <footer class="controls">
            <button onclick="prev()">< PREV</button>
            <div id="counter" style="font-size: 1.5rem;">0 / 0</div>
            <button onclick="next()">NEXT ></button>
        </footer>
    </div>

    <script>
        let MASTER_KEY = "";
        let currentCards = [];
        let index = 0;

        // ATARI RAIN ENGINE - Spustí se hned!
        function createAtariRain() {
            const container = document.getElementById('bg-elements');
            
            // ASCII loga a retro ryby
            const atariSymbols = [
                '//\\',  // Část loga Atari
                '///\\\\\\', // Celé logo (zjednodušené)
                '><(((°>', // Ryba
                '>°))))><', // Jiná ryba
                '[==]',   // Tank z Combat
                '👾'       // Invader emoji (ponecháno pro dope efekt)
            ];
            
            for(let i=0; i<30; i++) {
                const drop = document.createElement('div');
                drop.className = 'atari-drop';
                drop.innerText = atariSymbols[Math.floor(Math.random() * atariSymbols.length)];
                
                // Náhodná pozice a rychlost
                drop.style.left = Math.random() * 100 + 'vw';
                drop.style.animationDuration = (Math.random() * 5 + 3) + 's';
                drop.style.animationDelay = Math.random() * 5 + 's';
                
                // Náhodná velikost (trochu)
                drop.style.fontSize = (Math.random() * 1 + 1) + 'rem';
                
                container.appendChild(drop);
            }
        }

        function unlock() {
            const val = document.getElementById('passKey').value;
            if(!val) return;
            MASTER_KEY = val;

            if(val === "richard") {
                showDesktop();
                currentCards = ["STATUS:SYSTEM ONLINE", "TARGET:LEARNING MODE", "ARCHIVE:83 ACTIVE"];
                updateUI();
                return;
            }
            loadSubject();
        }

        function showDesktop() {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('desktop').style.display = 'grid';
        }

        async function loadSubject() {
            const sub = document.getElementById('subjectSelect').value;
            try {
                const response = await fetch(`./data/${sub}.txt`);
                const encryptedHex = await response.text();
                const bytes = CryptoJS.AES.decrypt(encryptedHex.trim(), MASTER_KEY);
                const decryptedText = bytes.toString(CryptoJS.enc.Utf8);

                if(!decryptedText) throw new Error();

                showDesktop();
                currentCards = decryptedText.split('\n').filter(l => l.includes(':'));
                index = 0;
                updateUI();
            } catch (e) {
                alert("ERROR: INVALID KEY.");
            }
        }

        function updateUI() {
            if(!currentCards.length) return;
            const parts = currentCards[index].split(':');
            document.getElementById('qText').innerText = parts[0];
            document.getElementById('aText').innerText = parts[1] || "";
            document.getElementById('counter').innerText = `${index + 1} / ${currentCards.length}`;
            document.getElementById('card').classList.remove('flipped');
        }

        function next() { index = (index + 1) % currentCards.length; updateUI(); }
        function prev() { index = (index - 1 + currentCards.length) % currentCards.length; updateUI(); }

        document.addEventListener('keydown', (e) => {
            if(e.code === "Space") document.getElementById('card').classList.toggle('flipped');
            if(e.code === "ArrowRight") next();
            if(e.code === "ArrowLeft") prev();
            if(e.code === "Enter" && document.getElementById('login-overlay').style.display !== 'none') unlock();
        });

        // Start Atari světa
        createAtariRain();
    </script>
</body>
</html>
