<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>MACHINARIUM::RELAX_UNIT</title>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background: #1a1a1a;
            color: #d2b48c;
            font-family: 'Special Elite', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        canvas {
            border: 8px solid #2d1e15;
            background: #2b2b2b;
            box-shadow: 0 0 50px rgba(0,0,0,0.5), inset 0 0 20px #000;
            cursor: none; /* Skryjeme myš, pádlo ji nahradí */
        }

        .info {
            margin-top: 20px;
            text-align: center;
            max-width: 500px;
        }

        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #b8860b;
            text-decoration: none;
            border: 1px solid #b8860b;
            padding: 5px 10px;
        }
    </style>
</head>
<body>

    <a href="../../index.html" class="back-link">⬅ ZPĚT DO TERMINÁLU</a>
    
    <h1>MECHANICKÝ BREAKOUT v0.1</h1>
    
    <canvas id="gameCanvas" width="600" height="400"></canvas>

    <div class="info">
        <p>POUŽIJ MYŠ K OVLÁDÁNÍ PÁDLA.</p>
        <p style="font-size: 0.8rem; opacity: 0.7;">PŘEMÝŠLEJ O DEADLOCÍCH, ZATÍMCO ODRAZÍŠ KULIČKU.</p>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Barvy Machinarium
        const RUST = "#8b4513";
        const BRASS = "#b8860b";
        const PAPER = "#d2b48c";
        const OIL = "#2b2b2b";

        // Nastavení pádla
        let paddleHeight = 15;
        let paddleWidth = 80;
        let paddleX = (canvas.width - paddleWidth) / 2;

        // Nastavení kuličky (vypadá jako rezavá matice)
        let ballRadius = 8;
        let x = canvas.width / 2;
        let y = canvas.height - 30;
        let dx = 3;
        let dy = -3;

        // Nastavení cihel (vypadají jako kovové pláty)
        let brickRowCount = 5;
        let brickColumnCount = 7;
        let brickWidth = 75;
        let brickHeight = 20;
        let brickPadding = 5;
        let brickOffsetTop = 40;
        let brickOffsetLeft = 25;

        let bricks = [];
        for (let c = 0; c < brickColumnCount; c++) {
            bricks[c] = [];
            for (let r = 0; r < brickRowCount; r++) {
                bricks[c][r] = { x: 0, y: 0, status: 1 };
            }
        }

        document.addEventListener("mousemove", mouseMoveHandler, false);

        function mouseMoveHandler(e) {
            let relativeX = e.clientX - canvas.offsetLeft;
            if (relativeX > 0 && relativeX < canvas.width) {
                paddleX = relativeX - paddleWidth / 2;
            }
        }

        function collisionDetection() {
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    let b = bricks[c][r];
                    if (b.status === 1) {
                        if (x > b.x && x < b.x + brickWidth && y > b.y && y < b.y + brickHeight) {
                            dy = -dy;
                            b.status = 0;
                        }
                    }
                }
            }
        }

        function drawBall() {
            ctx.beginPath();
            ctx.arc(x, y, ballRadius, 0, Math.PI * 2);
            ctx.fillStyle = RUST;
            ctx.fill();
            // Efekt šroubku/matice
            ctx.strokeStyle = "#000";
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.closePath();
        }

        function drawPaddle() {
            ctx.beginPath();
            ctx.rect(paddleX, canvas.height - paddleHeight - 5, paddleWidth, paddleHeight);
            ctx.fillStyle = BRASS;
            ctx.fill();
            ctx.strokeStyle = "#2d1e15";
            ctx.stroke();
            ctx.closePath();
        }

        function drawBricks() {
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    if (bricks[c][r].status === 1) {
                        let brickX = c * (brickWidth + brickPadding) + brickOffsetLeft;
                        let brickY = r * (brickHeight + brickPadding) + brickOffsetTop;
                        bricks[c][r].x = brickX;
                        bricks[c][r].y = brickY;
                        ctx.beginPath();
                        ctx.rect(brickX, brickY, brickWidth, brickHeight);
                        // Různé odstíny rzi pro cihly
                        ctx.fillStyle = (r % 2 === 0) ? "#4a3728" : "#5d432c";
                        ctx.fill();
                        ctx.strokeStyle = "#2d1e15";
                        ctx.stroke();
                        ctx.closePath();
                    }
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Pozadí s mírným šumem
            ctx.fillStyle = OIL;
            ctx.fillRect(0,0, canvas.width, canvas.height);
            
            drawBricks();
            drawBall();
            drawPaddle();
            collisionDetection();

            // Odrazy od stěn
            if (x + dx > canvas.width - ballRadius || x + dx < ballRadius) {
                dx = -dx;
            }
            if (y + dy < ballRadius) {
                dy = -dy;
            } else if (y + dy > canvas.height - ballRadius - 5) {
                if (x > paddleX && x < paddleX + paddleWidth) {
                    dy = -dy;
                    // Trochu zrychlíme
                    dy *= 1.05; 
                    dx *= 1.05;
                } else {
                    // Game Over - Reset
                    document.location.reload();
                }
            }

            x += dx;
            y += dy;
            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
